<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);padding:22px;font-family:var(--font-mono);display:flex;align-items:flex-end;gap:14px}
.c{display:flex;flex-direction:column;align-items:center;gap:6px}
.b{background:var(--nix-500);border-radius:2px}.n{font-size:10px;color:var(--fog-3)}.v{font-size:9px;color:var(--fog-4)}</style></head>
<body>
<div class="c"><div class="b" style="width:4px;height:4px"></div><span class="n">1</span><span class="v">4</span></div>
<div class="c"><div class="b" style="width:8px;height:8px"></div><span class="n">2</span><span class="v">8</span></div>
<div class="c"><div class="b" style="width:12px;height:12px"></div><span class="n">3</span><span class="v">12</span></div>
<div class="c"><div class="b" style="width:16px;height:16px"></div><span class="n">4</span><span class="v">16</span></div>
<div class="c"><div class="b" style="width:24px;height:24px"></div><span class="n">6</span><span class="v">24</span></div>
<div class="c"><div class="b" style="width:32px;height:32px"></div><span class="n">8</span><span class="v">32</span></div>
<div class="c"><div class="b" style="width:48px;height:48px"></div><span class="n">12</span><span class="v">48</span></div>
<div class="c"><div class="b" style="width:64px;height:64px"></div><span class="n">16</span><span class="v">64</span></div>
<div class="c"><div class="b" style="width:80px;height:80px"></div><span class="n">20</span><span class="v">80</span></div>
</body></html>
