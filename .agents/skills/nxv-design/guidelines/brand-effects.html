<!-- @dsCard group="Brand" viewport="700x160" name="Glow & elevation" subtitle="Accent glow, focus ring, elevation shadows" -->
<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);height:160px;display:flex;align-items:center;justify-content:center;gap:26px;font-family:var(--font-mono)}
.c{display:flex;flex-direction:column;align-items:center;gap:10px}.n{font-size:9.5px;color:var(--fog-4)}
.btn{padding:11px 18px;border-radius:var(--radius-md);background:var(--nix-600);color:#fff;font-size:13px;font-weight:600;box-shadow:var(--glow-accent)}
.ring{width:80px;height:44px;border-radius:var(--radius-md);background:var(--surface-raised);border:1px solid var(--accent-hover);box-shadow:var(--ring-focus)}
.el{width:80px;height:44px;border-radius:var(--radius-lg);background:var(--surface-panel);border:1px solid var(--border)}</style></head>
<body>
<div class="c"><div class="btn">$ try it now</div><span class="n">--glow-accent</span></div>
<div class="c"><div class="ring"></div><span class="n">--ring-focus</span></div>
<div class="c"><div class="el" style="box-shadow:var(--shadow-md)"></div><span class="n">--shadow-md</span></div>
<div class="c"><div class="el" style="box-shadow:var(--shadow-lg)"></div><span class="n">--shadow-lg</span></div>
</body></html>
