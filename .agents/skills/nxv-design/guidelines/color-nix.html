<!-- @dsCard group="Colors" viewport="700x150" name="Nix blue accent" subtitle="The brand accent scale — tint → pressed" -->
<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-mono);padding:20px}
.row{display:flex;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px}
.n{font-size:11px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}.v{font-size:9.5px;color:rgba(255,255,255,.75);margin-top:2px}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--nix-300)"><span class="n" style="color:#0b1020;text-shadow:none">nix-300</span><span class="v" style="color:rgba(0,0,0,.5)">icons</span></div>
<div class="sw" style="background:var(--nix-400)"><span class="n">nix-400</span><span class="v">accent text</span></div>
<div class="sw" style="background:var(--nix-500)"><span class="n">nix-500</span><span class="v">focus / link</span></div>
<div class="sw" style="background:var(--nix-600)"><span class="n">nix-600</span><span class="v">primary fill</span></div>
<div class="sw" style="background:var(--nix-700)"><span class="n">nix-700</span><span class="v">pressed</span></div>
</div></body></html>
