<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Soft-but-technical — controls 7–9px, containers 13–16px" -->
<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);padding:22px;font-family:var(--font-mono);display:flex;gap:16px;align-items:flex-start}
.c{display:flex;flex-direction:column;align-items:center;gap:8px}
.b{width:74px;height:64px;background:var(--surface-panel);border:1px solid var(--border)}
.n{font-size:10.5px;color:var(--fog-2)}.v{font-size:9px;color:var(--fog-4)}</style></head>
<body>
<div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><span class="n">sm · 7</span><span class="v">chip · kbd</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><span class="n">md · 9</span><span class="v">button · input</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><span class="n">lg · 13</span><span class="v">card · metric</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><span class="n">xl · 16</span><span class="v">panel</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-2xl)"></div><span class="n">2xl · 20</span><span class="v">large</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-full);width:64px"></div><span class="n">full</span><span class="v">pill · dot</span></div>
</body></html>
