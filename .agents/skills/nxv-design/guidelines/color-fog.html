<!-- @dsCard group="Colors" viewport="700x150" name="Fog text" subtitle="Text scale on ink, brightest → dimmest" -->
<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:22px;display:flex;flex-direction:column;gap:2px}
.r{display:flex;align-items:baseline;gap:16px;padding:6px 4px}
.t{flex:1;font-size:17px}.c{font-family:var(--font-mono);font-size:11px;color:var(--fog-4)}.u{font-family:var(--font-mono);font-size:11px;color:var(--fog-3);width:130px}</style></head>
<body>
<div class="r"><span class="t" style="color:var(--fog-0)">The quick brown fox</span><span class="u">--fog-0 / heading</span><span class="c">pure</span></div>
<div class="r"><span class="t" style="color:var(--fog-1)">The quick brown fox</span><span class="u">--fog-1 / strong</span><span class="c">headings</span></div>
<div class="r"><span class="t" style="color:var(--fog-2)">The quick brown fox</span><span class="u">--fog-2 / body</span><span class="c">default text</span></div>
<div class="r"><span class="t" style="color:var(--fog-3)">The quick brown fox</span><span class="u">--fog-3 / muted</span><span class="c">secondary</span></div>
<div class="r"><span class="t" style="color:var(--fog-4)">The quick brown fox</span><span class="u">--fog-4 / subtle</span><span class="c">captions</span></div>
</body></html>
