<!-- @dsCard group="Colors" viewport="700x150" name="Ink surfaces" subtitle="Deep cool-navy surface scale, page → border" -->
<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-mono);padding:20px}
.row{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px}
.n{font-size:11px;color:var(--fog-1);text-shadow:0 1px 2px #000}.v{font-size:9.5px;color:var(--fog-3);margin-top:2px}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--ink-900)"><span class="n">ink-900</span><span class="v">code</span></div>
<div class="sw" style="background:var(--ink-850)"><span class="n">ink-850</span><span class="v">page</span></div>
<div class="sw" style="background:var(--ink-800)"><span class="n">ink-800</span><span class="v">raised</span></div>
<div class="sw" style="background:var(--ink-700)"><span class="n">ink-700</span><span class="v">panel</span></div>
<div class="sw" style="background:var(--ink-600)"><span class="n">ink-600</span><span class="v">hover</span></div>
<div class="sw" style="background:var(--ink-500)"><span class="n">ink-500</span><span class="v">border</span></div>
<div class="sw" style="background:var(--ink-400)"><span class="n">ink-400</span><span class="v">muted line</span></div>
</div></body></html>
