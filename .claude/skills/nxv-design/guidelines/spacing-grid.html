<!-- @dsCard group="Spacing" viewport="700x160" name="Blueprint grid" subtitle="The signature background — 48px grid, masked fade" -->
<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);padding:0;position:relative;height:160px;overflow:hidden}
.grid{position:absolute;inset:0;background-image:var(--grid-image);background-size:var(--grid-cell) var(--grid-cell);
  -webkit-mask-image:radial-gradient(ellipse 90% 90% at 30% 20%,#000 20%,transparent 78%);mask-image:radial-gradient(ellipse 90% 90% at 30% 20%,#000 20%,transparent 78%)}
.lbl{position:absolute;left:22px;top:20px;font-family:var(--font-mono);font-size:12px;color:var(--fog-2)}
.sub{position:absolute;left:22px;top:42px;font-family:var(--font-mono);font-size:10px;color:var(--fog-4)}</style></head>
<body><div class="grid"></div><div class="lbl">--grid-image · --grid-cell 48px</div><div class="sub">masked with a radial gradient so it fades out where content sits</div></body></html>
