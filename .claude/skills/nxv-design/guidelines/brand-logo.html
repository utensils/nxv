<!doctype html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--surface-page);padding:0;height:160px;display:flex;align-items:center;gap:40px;padding-left:32px}
.lock{display:flex;align-items:center;gap:12px}
.wm{font-family:var(--font-mono);font-weight:700;font-size:22px;letter-spacing:-.02em;color:var(--fog-0)}

.cap{font-family:var(--font-mono);font-size:10px;color:var(--fog-4);margin-top:8px}

<body>
<div class="col"><div class="lock"><img src="../assets/nxv-logo-dark.svg" width="34" height="34" alt=""><span class="wm">nxv</span></div><span class="cap">bracket monogram · wordmark</span></div>
<div class="sp"></div>
<div class="col"><div class="lock"><img src="../assets/nix-snowflake.svg" width="40" height="40" alt=""><span class="at"><b>nxv</b> @ urandom.io</span></div><span class="cap">Nix snowflake · favicon / brand-forward mark</span></div>
